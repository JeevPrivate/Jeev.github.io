<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Jeev's Fitness</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
        }
        .navbar {
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(71,85,105,0.4);
        }
        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links a {
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            background: rgba(56,189,248,0.1);
            color: #cbd5e1;
            margin-left: 10px;
        }
        .nav-links a.active {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }
        .section {
            background: rgba(30,41,59,0.6);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(71,85,105,0.4);
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #f1f5f9;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label { font-size: 0.75rem; font-weight: 600; color: #94a3b8; }
        .form-group input, .form-group select {
            background: rgba(15,23,42,0.8);
            border: 1px solid rgba(71,85,105,0.5);
            padding: 10px;
            border-radius: 16px;
            color: white;
        }
        .btn {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .exercise-item, .measurement-item {
            background: rgba(15,23,42,0.6);
            padding: 12px;
            border-radius: 18px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .delete-btn, .rename-btn {
            padding: 5px 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            margin-left: 5px;
        }
        .delete-btn { background: rgba(239,68,68,0.2); color: #f87171; }
        .rename-btn { background: rgba(56,189,248,0.2); color: #38bdf8; }
        .profile-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(56,189,248,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid #38bdf8;
        }
        .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-preview i { font-size: 2.5rem; color: #38bdf8; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="navbar">
    <div class="logo">Jeev's Fitness</div>
    <div class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="editor.html" class="active">Settings</a>
    </div>
</div>
<div class="container">
    <!-- Profile Picture -->
    <div class="section" id="profile">
        <div class="section-title"><i class="fas fa-camera"></i> Profile Picture</div>
        <div class="profile-upload">
            <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('imageUpload').click()">
                <i class="fas fa-user"></i>
            </div>
            <input type="file" id="imageUpload" accept="image/*" style="display:none">
            <p style="font-size:0.8rem; color:#94a3b8">Click to upload your photo</p>
        </div>
    </div>

    <!-- Custom Exercises -->
    <div class="section">
        <div class="section-title"><i class="fas fa-dumbbell"></i> Custom Exercises</div>
        <div class="form-grid">
            <div class="form-group"><label>Exercise Name</label><input type="text" id="newExName" placeholder="e.g., Cycling"></div>
            <div class="form-group"><label>Unit</label><input type="text" id="newExUnit" placeholder="km, reps, min"></div>
            <div class="form-group"><label>Calories per Unit</label><input type="number" id="newExCoeff" step="0.1"></div>
        </div>
        <button class="btn" id="addExBtn">+ Add Exercise</button>
        <div id="exercisesList" style="margin-top: 20px;"></div>
    </div>

    <!-- Body Measurements -->
    <div class="section">
        <div class="section-title"><i class="fas fa-heartbeat"></i> Body Measurements</div>
        <div class="form-grid">
            <div class="form-group"><label>Date</label><input type="date" id="measDate" value="2026-04-03"></div>
            <div class="form-group"><label>Age</label><input type="number" id="measAge"></div>
            <div class="form-group"><label>Height (cm)</label><input type="number" id="measHeight"></div>
            <div class="form-group"><label>Weight (kg)</label><input type="number" id="measWeight"></div>
            <div class="form-group"><label>Waist (cm)</label><input type="number" id="measWaist"></div>
            <div class="form-group"><label>Bicep (cm)</label><input type="number" id="measBicep"></div>
        </div>
        <button class="btn" id="saveMeasBtn">Save Measurements</button>
        <div id="measHistory" style="margin-top: 20px;"></div>
    </div>
</div>

<script>
    let EXERCISES = [];
    let measurementHistory = [];

    function load() {
        EXERCISES = JSON.parse(localStorage.getItem('customExercises') || '[]');
        if(EXERCISES.length===0){
            EXERCISES = [
                { id: "pushups", name: "Push-ups", unit: "reps", coeff: 0.5 },
                { id: "skipping", name: "Skipping", unit: "jumps", coeff: 0.1 },
                { id: "walking", name: "Walking", unit: "km", coeff: 50 },
                { id: "burpees", name: "Burpees", unit: "reps", coeff: 1.2 },
                { id: "squats", name: "Squats", unit: "reps", coeff: 0.6 },
                { id: "plank", name: "Plank", unit: "min", coeff: 4 },
                { id: "situps", name: "Sit-ups", unit: "reps", coeff: 0.4 }
            ];
            localStorage.setItem('customExercises', JSON.stringify(EXERCISES));
        }
        measurementHistory = JSON.parse(localStorage.getItem('measurementHistory') || '[]');
        renderExercises();
        renderMeasHistory();
        loadProfileImage();
        let latest = measurementHistory.sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
        if(latest){
            document.getElementById('measAge').value = latest.age||'';
            document.getElementById('measHeight').value = latest.height||'';
            document.getElementById('measWeight').value = latest.weight||'';
            document.getElementById('measWaist').value = latest.waist||'';
            document.getElementById('measBicep').value = latest.bicep||'';
        }
    }

    function loadProfileImage(){
        let saved = localStorage.getItem('profileImage');
        let preview = document.getElementById('avatarPreview');
        if(saved) preview.innerHTML = `<img src="${saved}" alt="Profile">`;
        else preview.innerHTML = '<i class="fas fa-user"></i>';
    }

    function renderExercises(){
        let container = document.getElementById('exercisesList');
        container.innerHTML = EXERCISES.map((ex,i)=>`
            <div class="exercise-item">
                <div><strong>${ex.name}</strong> (${ex.unit}) - ${ex.coeff} cal/unit</div>
                <div><button class="rename-btn" onclick="renameEx(${i})">Rename</button><button class="delete-btn" onclick="deleteEx(${i})">Delete</button></div>
            </div>
        `).join('');
    }

    function addExercise(){
        let name = document.getElementById('newExName').value.trim();
        let unit = document.getElementById('newExUnit').value.trim();
        let coeff = parseFloat(document.getElementById('newExCoeff').value);
        if(!name || !unit || isNaN(coeff)){ alert('Fill all fields'); return; }
        let id = name.toLowerCase().replace(/\s/g,'');
        EXERCISES.push({ id, name, unit, coeff });
        localStorage.setItem('customExercises', JSON.stringify(EXERCISES));
        renderExercises();
        document.getElementById('newExName').value='';
        document.getElementById('newExUnit').value='';
        document.getElementById('newExCoeff').value='';
        alert('Exercise added! Refresh dashboard.');
    }

    function renameEx(idx){
        let newName = prompt('New name:', EXERCISES[idx].name);
        if(newName){
            EXERCISES[idx].name = newName;
            EXERCISES[idx].id = newName.toLowerCase().replace(/\s/g,'');
            localStorage.setItem('customExercises', JSON.stringify(EXERCISES));
            renderExercises();
        }
    }

    function deleteEx(idx){
        if(confirm(`Delete ${EXERCISES[idx].name}?`)){
            EXERCISES.splice(idx,1);
            localStorage.setItem('customExercises', JSON.stringify(EXERCISES));
            renderExercises();
        }
    }

    function renderMeasHistory(){
        let container = document.getElementById('measHistory');
        if(measurementHistory.length===0){ container.innerHTML='<p>No measurements yet</p>'; return; }
        let sorted = [...measurementHistory].sort((a,b)=>new Date(b.date)-new Date(a.date));
        container.innerHTML = sorted.map(m=>`
            <div class="measurement-item">
                <div><strong>${m.date}</strong> | ${m.weight}kg | BMI: ${m.weight && m.height ? (m.weight/((m.height/100)**2)).toFixed(1) : 'N/A'}</div>
                <button class="delete-btn" onclick="deleteMeas('${m.date}')">Delete</button>
            </div>
        `).join('');
    }

    function saveMeasurement(){
        let meas = {
            date: document.getElementById('measDate').value,
            age: document.getElementById('measAge').value,
            height: document.getElementById('measHeight').value,
            weight: document.getElementById('measWeight').value,
            waist: document.getElementById('measWaist').value,
            bicep: document.getElementById('measBicep').value
        };
        if(!meas.date){ alert('Select date'); return; }
        let idx = measurementHistory.findIndex(m=>m.date===meas.date);
        if(idx!==-1) measurementHistory[idx]=meas;
        else measurementHistory.push(meas);
        localStorage.setItem('measurementHistory', JSON.stringify(measurementHistory));
        localStorage.setItem('profileData', JSON.stringify(meas));
        renderMeasHistory();
        alert('Measurements saved!');
    }

    function deleteMeas(date){
        if(confirm('Delete this measurement?')){
            measurementHistory = measurementHistory.filter(m=>m.date!==date);
            localStorage.setItem('measurementHistory', JSON.stringify(measurementHistory));
            renderMeasHistory();
        }
    }

    function handleImageUpload(e){
        let file = e.target.files[0];
        if(file){
            let reader = new FileReader();
            reader.onload = function(ev){
                let img = new Image();
                img.onload = function(){
                    let canvas = document.createElement('canvas');
                    let size = Math.min(img.width, img.height);
                    canvas.width = 200; canvas.height = 200;
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0,0,200,200);
                    localStorage.setItem('profileImage', canvas.toDataURL());
                    loadProfileImage();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    }

    document.getElementById('addExBtn').addEventListener('click', addExercise);
    document.getElementById('saveMeasBtn').addEventListener('click', saveMeasurement);
    document.getElementById('imageUpload').addEventListener('change', handleImageUpload);
    window.renameEx = renameEx;
    window.deleteEx = deleteEx;
    window.deleteMeas = deleteMeas;
    load();
</script>
</body>
</html>
