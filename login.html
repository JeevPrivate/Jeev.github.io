<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | Jeev's Fitness</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e2e8f0;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }
        .logo {
            margin-bottom: 30px;
        }
        .logo-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo h1 {
            font-size: 1.8rem;
            margin-top: 10px;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        .input-group {
            margin: 20px 0;
        }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(15,23,42,0.8);
            border: 1px solid rgba(71,85,105,0.5);
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56,189,248,0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border: none;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
            transition: 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        .error {
            color: #f87171;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .info-text {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-heartbeat logo-icon"></i>
            <h1>Jeev's Fitness</h1>
            <p>Your wellness journey</p>
        </div>

        <!-- Login Section (visible only if password exists) -->
        <div id="loginSection" style="display: none;">
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            <button id="loginBtn">Unlock Dashboard</button>
            <div id="loginError" class="error"></div>
            <div class="info-text">
                <i class="fas fa-lock"></i> Your data is encrypted locally.
            </div>
        </div>

        <!-- Setup Section (visible only if NO password exists) -->
        <div id="setupSection" style="display: none;">
            <div class="input-group">
                <input type="password" id="newPassword" placeholder="Create a password (min 4 chars)">
            </div>
            <button id="setupBtn">Create Password & Login</button>
            <div id="setupError" class="error"></div>
            <div class="info-text">
                <i class="fas fa-key"></i> Set a password to protect your fitness data. This will be saved in your browser.
            </div>
        </div>
    </div>
</div>

<script>
    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function hasPassword() {
        return localStorage.getItem('jeev_password_hash') !== null;
    }

    function updateUI() {
        const passwordExists = hasPassword();
        document.getElementById('loginSection').style.display = passwordExists ? 'block' : 'none';
        document.getElementById('setupSection').style.display = passwordExists ? 'none' : 'block';
    }

    async function login(password) {
        const storedHash = localStorage.getItem('jeev_password_hash');
        if (!storedHash) {
            document.getElementById('loginError').innerText = 'No password set. Please use the setup form.';
            return false;
        }
        const inputHash = await hashPassword(password);
        if (inputHash === storedHash) {
            sessionStorage.setItem('jeev_logged_in', 'true');
            window.location.href = 'index.html';
            return true;
        } else {
            document.getElementById('loginError').innerText = 'Incorrect password.';
            return false;
        }
    }

    async function setupPassword(password) {
        if (hasPassword()) {
            document.getElementById('setupError').innerText = 'Password already set. Use login instead.';
            return false;
        }
        if (!password || password.length < 4) {
            document.getElementById('setupError').innerText = 'Password must be at least 4 characters.';
            return false;
        }
        const hash = await hashPassword(password);
        localStorage.setItem('jeev_password_hash', hash);
        sessionStorage.setItem('jeev_logged_in', 'true');
        window.location.href = 'index.html';
        return true;
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const pwd = document.getElementById('loginPassword').value;
        await login(pwd);
    });

    document.getElementById('setupBtn').addEventListener('click', async () => {
        const newPwd = document.getElementById('newPassword').value;
        await setupPassword(newPwd);
    });

    if (sessionStorage.getItem('jeev_logged_in') === 'true') {
        window.location.href = 'index.html';
    }

    updateUI();
</script>
</body>
</html>
